name: Deploy MyST

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install mystmd
        run: pip install mystmd

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build
        run: myst build --html --execute

      - name: Check build output
        run: find _build -type f -name "*.html" | head -20

      - name: List gh-pages content
        run: |
          git fetch origin gh-pages || echo "gh-pages branch not found"
          git ls-tree -r gh-pages --name-only | head -30 || echo "Could not list gh-pages"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html